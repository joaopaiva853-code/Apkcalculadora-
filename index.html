<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="theme-color" content="#0a1219">
    <title>IPTV Manager Pro - Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
            min-height: 100vh;
            color: #eef2ff;
            padding: 16px;
        }

        .app-container {
            max-width: 600px;
            margin: 0 auto;
            width: 100%;
        }

        .header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 1.5rem;
            padding: 1.2rem;
            margin-bottom: 1.2rem;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }
        .header h1 { font-size: 1.6rem; margin-bottom: 0.25rem; }
        .header p { font-size: 0.8rem; opacity: 0.9; }

        .stats-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 1.2rem;
            padding: 12px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .stat-card .value {
            font-size: 1.8rem;
            font-weight: 700;
            color: #f093fb;
        }
        .stat-card .label {
            font-size: 0.75rem;
            opacity: 0.8;
            margin-top: 4px;
        }

        .charts-grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 20px;
        }
        .chart-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 1.2rem;
            padding: 12px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .chart-card h3 {
            font-size: 0.9rem;
            margin-bottom: 12px;
            text-align: center;
        }
        canvas {
            max-height: 200px !important;
            width: 100% !important;
        }

        .tabs {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        .tab-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            padding: 10px 18px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            flex: 1 0 auto;
            text-align: center;
            transition: 0.2s;
        }
        .tab-btn.active {
            background: linear-gradient(135deg, #f093fb, #f5576c);
        }
        .page-btn {
            background: linear-gradient(135deg, #10b981, #059669);
        }
        .tab-content {
            display: none;
            animation: fadeIn 0.25s ease;
        }
        .tab-content.active { display: block; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px);}
            to { opacity: 1; transform: translateY(0);}
        }

        .btn {
            padding: 12px 20px;
            border-radius: 2rem;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            border: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            transition: 0.2s;
        }
        .btn-primary { background: linear-gradient(135deg, #f093fb, #f5576c); color: white; }
        .btn-secondary { background: rgba(255,255,255,0.15); color: white; border: 1px solid rgba(255,255,255,0.2); }
        .btn-danger { background: #dc2626; color: white; }
        .btn-success { background: #10b981; color: white; }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #10b981;
            color: white;
            padding: 12px 20px;
            border-radius: 40px;
            font-size: 0.85rem;
            z-index: 2000;
            white-space: nowrap;
        }
        @media (max-width: 480px) {
            .stat-card .value { font-size: 1.4rem; }
            .tab-btn { font-size: 0.7rem; padding: 8px 12px; }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <h1>📺 IPTV Manager Pro</h1>
        <p>Dashboard - Visão geral do negócio</p>
    </div>

    <div class="stats-grid">
        <div class="stat-card"><div class="value" id="totalClients">0</div><div class="label">Total de Clientes</div></div>
        <div class="stat-card"><div class="value" id="activeClients">0</div><div class="label">Ativos</div></div>
        <div class="stat-card"><div class="value" id="expiringClients">0</div><div class="label">Vencem em 7 dias</div></div>
        <div class="stat-card"><div class="value" id="totalRevenue">R$ 0</div><div class="label">Faturamento Total</div></div>
        <div class="stat-card"><div class="value" id="monthlyRevenue">R$ 0</div><div class="label">Este Mês</div></div>
    </div>

    <div class="charts-grid">
        <div class="chart-card"><h3>📊 Planos por Cliente</h3><canvas id="plansChart"></canvas></div>
        <div class="chart-card"><h3>💰 Faturamento Mensal</h3><canvas id="revenueChart"></canvas></div>
    </div>

    <!-- Botões principais: todos abrem páginas externas (Clientes, Finanças, Configurações) + aba Relatórios interna -->
    <div class="tabs">
        <button class="tab-btn page-btn" id="openClientsPageBtn">👥 Clientes (Nova Janela)</button>
        <button class="tab-btn page-btn" id="openFinancePageBtn">💰 Finanças (Nova Janela)</button>
        <button class="tab-btn active" data-tab="reports">📈 Relatórios</button>
        <button class="tab-btn page-btn" id="openSettingsPageBtn">⚙️ Config (Nova Janela)</button>
    </div>

    <!-- Aba Relatórios (única que permanece interna) -->
    <div id="tabReports" class="tab-content active">
        <div class="charts-grid">
            <div class="chart-card"><h3>📊 Distribuição de Planos</h3><canvas id="planDistributionChart"></canvas></div>
            <div class="chart-card"><h3>💰 Receitas vs Despesas</h3><canvas id="incomeExpenseChart"></canvas></div>
        </div>
        <div class="stats-grid" style="margin-top: 12px;">
            <div class="stat-card"><div class="value" id="totalIncome">R$ 0</div><div class="label">Total Receitas</div></div>
            <div class="stat-card"><div class="value" id="totalExpense">R$ 0</div><div class="label">Total Despesas</div></div>
            <div class="stat-card"><div class="value" id="netProfit">R$ 0</div><div class="label">Lucro Líquido</div></div>
        </div>
    </div>
</div>

<script>
    // ====================== DADOS GLOBAIS (mesmo localStorage) ======================
    let clients = [];
    let transactions = [];
    let settings = { companyName: "IPTV Manager Pro", supportWhatsapp: "" };
    let plans = [
        { id: "mensal", name: "Mensal", price: 29.90, months: 1 },
        { id: "bimestral", name: "Bimestral", price: 54.90, months: 2 },
        { id: "trimestral", name: "Trimestral", price: 79.90, months: 3 },
        { id: "anual", name: "Anual", price: 299.90, months: 12 }
    ];
    
    let charts = {};

    function loadData() {
        const savedClients = localStorage.getItem('iptv_clients');
        const savedTransactions = localStorage.getItem('iptv_transactions');
        const savedSettings = localStorage.getItem('iptv_settings');
        const savedPlans = localStorage.getItem('iptv_plans');
        
        if (savedClients) clients = JSON.parse(savedClients);
        else initDefaultClients();
        
        if (savedTransactions) transactions = JSON.parse(savedTransactions);
        else initDefaultTransactions();
        
        if (savedSettings) settings = { ...settings, ...JSON.parse(savedSettings) };
        if (savedPlans) plans = JSON.parse(savedPlans);
        
        applySettings();
        renderAll();
    }

    function initDefaultClients() {
        const today = new Date();
        clients = [
            { id: 1, name: "João Silva", whatsapp: "11999999999", planId: "mensal", dueDate: new Date(today.setDate(today.getDate() + 15)).toISOString().split('T')[0], status: "active", notes: "" },
            { id: 2, name: "Maria Santos", whatsapp: "11988888888", planId: "anual", dueDate: new Date(today.setDate(today.getDate() + 180)).toISOString().split('T')[0], status: "active", notes: "" },
            { id: 3, name: "Carlos Oliveira", whatsapp: "11977777777", planId: "trimestral", dueDate: new Date(today.setDate(today.getDate() - 5)).toISOString().split('T')[0], status: "expired", notes: "" }
        ];
        saveClients();
    }

    function initDefaultTransactions() {
        const today = new Date().toISOString().split('T')[0];
        transactions = [
            { id: 1, type: "income", description: "Assinatura - João Silva", amount: 29.90, category: "Assinatura", date: today },
            { id: 2, type: "income", description: "Assinatura - Maria Santos", amount: 299.90, category: "Assinatura", date: today },
            { id: 3, type: "expense", description: "Servidor Streaming", amount: 150.00, category: "Servidor", date: today }
        ];
        saveTransactions();
    }

    function saveClients() { localStorage.setItem('iptv_clients', JSON.stringify(clients)); }
    function saveTransactions() { localStorage.setItem('iptv_transactions', JSON.stringify(transactions)); }
    function saveSettingsToLocal() { localStorage.setItem('iptv_settings', JSON.stringify(settings)); }
    function savePlansToLocal() { localStorage.setItem('iptv_plans', JSON.stringify(plans)); }

    function getPlanById(planId) { return plans.find(p => p.id === planId) || plans[0]; }

    function applySettings() {
        document.querySelector('.header h1').innerHTML = `📺 ${settings.companyName}`;
    }

    function renderAll() {
        renderStats();
        renderReportsCharts();
        updateMainCharts();
    }

    function renderStats() {
        document.getElementById('totalClients').innerText = clients.length;
        document.getElementById('activeClients').innerText = clients.filter(c => c.status === 'active').length;
        const today = new Date();
        const nextWeek = new Date(today); nextWeek.setDate(today.getDate() + 7);
        const expiring = clients.filter(c => c.status === 'active' && new Date(c.dueDate) <= nextWeek).length;
        document.getElementById('expiringClients').innerText = expiring;
        const totalRev = transactions.filter(t => t.type === 'income').reduce((s,t)=>s+t.amount,0);
        const monthRev = transactions.filter(t => t.type === 'income' && t.date.startsWith(new Date().toISOString().slice(0,7))).reduce((s,t)=>s+t.amount,0);
        document.getElementById('totalRevenue').innerHTML = formatCurrency(totalRev);
        document.getElementById('monthlyRevenue').innerHTML = formatCurrency(monthRev);
    }

    function renderReportsCharts() {
        const planCount = {};
        plans.forEach(p => { planCount[p.id] = 0; });
        clients.forEach(c => { if (planCount[c.planId] !== undefined) planCount[c.planId]++; else planCount[c.planId] = 1; });
        const labels = plans.map(p => p.name);
        const data = plans.map(p => planCount[p.id] || 0);
        
        if (charts.planDistributionChart) charts.planDistributionChart.destroy();
        const ctxDist = document.getElementById('planDistributionChart').getContext('2d');
        charts.planDistributionChart = new Chart(ctxDist, {
            type: 'doughnut',
            data: { labels, datasets: [{ data, backgroundColor: ['#f093fb','#f5576c','#667eea','#764ba2'] }] },
            options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { position: 'bottom', labels: { color: 'white', font: { size: 10 } } } } }
        });
        
        const monthlyData = {};
        transactions.forEach(t => {
            const m = t.date.slice(0,7);
            if(!monthlyData[m]) monthlyData[m] = { income:0, expense:0 };
            if(t.type === 'income') monthlyData[m].income += t.amount;
            else monthlyData[m].expense += t.amount;
        });
        
        if(charts.incomeExpenseChart) charts.incomeExpenseChart.destroy();
        const ctxIE = document.getElementById('incomeExpenseChart').getContext('2d');
        const months = Object.keys(monthlyData).sort().slice(-6);
        const incData = months.map(m => monthlyData[m].income);
        const expData = months.map(m => monthlyData[m].expense);
        charts.incomeExpenseChart = new Chart(ctxIE, {
            type: 'bar',
            data: { labels: months, datasets: [{ label: 'Receitas', data: incData, backgroundColor: '#10b981' }, { label: 'Despesas', data: expData, backgroundColor: '#dc2626' }] },
            options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { position: 'top', labels: { color: 'white', font: { size: 10 } } } }, scales: { y: { ticks: { color: 'white' } }, x: { ticks: { color: 'white' } } } }
        });
        
        const totalIncome = transactions.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
        const totalExpense = transactions.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
        document.getElementById('totalIncome').innerHTML = formatCurrency(totalIncome);
        document.getElementById('totalExpense').innerHTML = formatCurrency(totalExpense);
        document.getElementById('netProfit').innerHTML = formatCurrency(totalIncome - totalExpense);
    }

    function updateMainCharts() {
        const planCount = {};
        plans.forEach(p => { planCount[p.id] = 0; });
        clients.forEach(c => { if (planCount[c.planId] !== undefined) planCount[c.planId]++; else planCount[c.planId] = 1; });
        const labels = plans.map(p => p.name);
        const data = plans.map(p => planCount[p.id] || 0);
        
        if(charts.plansChart) charts.plansChart.destroy();
        const ctxPlans = document.getElementById('plansChart').getContext('2d');
        charts.plansChart = new Chart(ctxPlans, {
            type: 'pie',
            data: { labels, datasets: [{ data, backgroundColor: ['#f093fb','#f5576c','#667eea','#764ba2'] }] },
            options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { position: 'bottom', labels: { color: 'white', font: { size: 10 } } } } }
        });
        
        const monthlyRev = {};
        transactions.filter(t=>t.type==='income').forEach(t => { const m = t.date.slice(0,7); monthlyRev[m] = (monthlyRev[m]||0) + t.amount; });
        const lastMonths = Object.keys(monthlyRev).sort().slice(-6);
        const revData = lastMonths.map(m => monthlyRev[m]||0);
        if(charts.revenueChart) charts.revenueChart.destroy();
        const ctxRev = document.getElementById('revenueChart').getContext('2d');
        charts.revenueChart = new Chart(ctxRev, {
            type: 'line',
            data: { labels: lastMonths, datasets: [{ label: 'Faturamento', data: revData, borderColor: '#f093fb', backgroundColor: 'rgba(240,147,251,0.1)', fill: true, tension: 0.3 }] },
            options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { labels: { color: 'white', font: { size: 10 } } } }, scales: { y: { ticks: { color: 'white' } }, x: { ticks: { color: 'white' } } } }
        });
    }

    // ====================== ABRIR PÁGINAS EXTERNAS ======================
    function openClientsPage() {
        const win = window.open();
        if(win) {
            win.document.write(generateClientsPageHTML());
            win.document.close();
        } else alert("Permita pop-ups para abrir clientes.");
    }
    function openFinancePage() {
        const win = window.open();
        if(win) {
            win.document.write(generateFinancePageHTML());
            win.document.close();
        } else alert("Permita pop-ups para abrir finanças.");
    }
    function openSettingsPage() {
        const win = window.open();
        if(win) {
            win.document.write(generateSettingsPageHTML());
            win.document.close();
        } else alert("Permita pop-ups para abrir configurações.");
    }

    function formatCurrency(v) { return new Intl.NumberFormat('pt-BR', { style:'currency', currency:'BRL' }).format(v); }
    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
    function showToast(msg) { const t = document.createElement('div'); t.className='toast'; t.innerText=msg; document.body.appendChild(t); setTimeout(()=>t.remove(), 2500); }

    window.addEventListener('focus', () => loadData());

    document.querySelectorAll('.tab-btn[data-tab]').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById(`tab${btn.dataset.tab.charAt(0).toUpperCase() + btn.dataset.tab.slice(1)}`).classList.add('active');
        });
    });
    document.getElementById('openClientsPageBtn')?.addEventListener('click', (e) => { e.preventDefault(); openClientsPage(); });
    document.getElementById('openFinancePageBtn')?.addEventListener('click', (e) => { e.preventDefault(); openFinancePage(); });
    document.getElementById('openSettingsPageBtn')?.addEventListener('click', (e) => { e.preventDefault(); openSettingsPage(); });
    
    loadData();

    // ========== PÁGINA EXTERNA DE CONFIGURAÇÕES (completa, com botão Voltar) ==========
    function generateSettingsPageHTML() {
        return `<!DOCTYPE html>
        <html lang="pt-br">
        <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
            <title>Configurações - IPTV Manager</title>
            <style>
                * { margin: 0; padding: 0; box-sizing: border-box; }
                body { background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); font-family: 'Inter', system-ui, sans-serif; color: #eef2ff; padding: 16px; }
                .container { max-width: 600px; margin: 0 auto; }
                .header { background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 1.5rem; padding: 1.2rem; margin-bottom: 1.2rem; text-align: center; }
                .card { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border-radius: 1.2rem; padding: 1.2rem; margin-bottom: 1.2rem; border: 1px solid rgba(255,255,255,0.1); }
                .form-group { margin-bottom: 14px; }
                .form-group label { display: block; margin-bottom: 5px; font-size: 0.75rem; opacity: 0.8; }
                .form-group input, .form-group select { width: 100%; padding: 12px; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.2); border-radius: 1rem; color: white; font-size: 0.9rem; }
                .btn { padding: 12px 20px; border-radius: 2rem; font-weight: 600; font-size: 0.85rem; cursor: pointer; border: none; display: inline-flex; align-items: center; justify-content: center; gap: 8px; width: 100%; margin-top: 8px; transition: 0.2s; }
                .btn-primary { background: linear-gradient(135deg, #f093fb, #f5576c); color: white; }
                .btn-secondary { background: rgba(255,255,255,0.15); color: white; border: 1px solid rgba(255,255,255,0.2); }
                .btn-danger { background: #dc2626; color: white; }
                .btn-success { background: #10b981; color: white; }
                .plan-editor { display: flex; flex-direction: column; gap: 12px; margin: 16px 0; }
                .plan-item { background: rgba(255,255,255,0.03); border-radius: 1rem; padding: 12px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
                .plan-item input { flex: 2; min-width: 100px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2); border-radius: 1rem; padding: 8px 12px; color: white; }
                .row-buttons { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 12px; }
                .row-buttons .btn { flex: 1; }
                hr { margin: 16px 0; border-color: rgba(255,255,255,0.1); }
                .back-btn { text-align: center; margin-top: 20px; }
                .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #10b981; color: white; padding: 10px 20px; border-radius: 40px; font-size: 0.8rem; z-index: 2000; }
            </style>
        </head>
        <body>
        <div class="container">
            <div class="header"><h1>⚙️ Configurações do Sistema</h1><p>Personalize sua experiência</p></div>
            <div class="card">
                <div class="form-group"><label>Nome da Empresa</label><input type="text" id="companyName" placeholder="IPTV Manager Pro"></div>
                <div class="form-group"><label>WhatsApp para Suporte</label><input type="text" id="supportWhatsapp" placeholder="11999999999"></div>
                <button class="btn btn-primary" onclick="saveGeneralSettings()">💾 Salvar Configurações</button>
                
                <hr>
                <h3>✏️ Editar Planos (Nomes, Preços e Duração em meses)</h3>
                <div id="plansEditor" class="plan-editor"></div>
                <button class="btn btn-success" onclick="savePlans()">💾 Salvar Planos</button>
                <button class="btn btn-secondary" onclick="resetDefaultPlans()">↺ Restaurar Padrão</button>
                
                <hr>
                <div class="row-buttons">
                    <button class="btn btn-secondary" onclick="exportData()">📤 Exportar Dados</button>
                    <button class="btn btn-danger" onclick="resetData()">⚠️ Resetar Tudo</button>
                </div>
                <input type="file" id="importFile" accept=".json" style="display: none;" onchange="importData(this)">
                <button class="btn btn-secondary" style="margin-top: 12px;" onclick="document.getElementById('importFile').click()">📥 Importar Dados</button>
            </div>
            <div class="back-btn"><button class="btn btn-secondary" onclick="window.close()">🔙 Voltar (Fechar Janela)</button></div>
        </div>
        <script>
            let settings = { companyName: "IPTV Manager Pro", supportWhatsapp: "" };
            let plans = [];

            function loadData() {
                const savedSettings = localStorage.getItem('iptv_settings');
                const savedPlans = localStorage.getItem('iptv_plans');
                if (savedSettings) settings = { ...settings, ...JSON.parse(savedSettings) };
                if (savedPlans) plans = JSON.parse(savedPlans);
                else plans = [
                    { id: "mensal", name: "Mensal", price: 29.90, months: 1 },
                    { id: "bimestral", name: "Bimestral", price: 54.90, months: 2 },
                    { id: "trimestral", name: "Trimestral", price: 79.90, months: 3 },
                    { id: "anual", name: "Anual", price: 299.90, months: 12 }
                ];
                applySettings();
                renderPlansEditor();
            }
            function applySettings() {
                document.getElementById('companyName').value = settings.companyName;
                document.getElementById('supportWhatsapp').value = settings.supportWhatsapp;
            }
            function saveGeneralSettings() {
                settings.companyName = document.getElementById('companyName').value || "IPTV Manager Pro";
                settings.supportWhatsapp = document.getElementById('supportWhatsapp').value;
                localStorage.setItem('iptv_settings', JSON.stringify(settings));
                showToast("Configurações salvas!");
            }
            function renderPlansEditor() {
                const container = document.getElementById('plansEditor');
                if (!container) return;
                let html = '';
                plans.forEach((plan) => {
                    html += \`
                        <div class="plan-item">
                            <input type="text" value="\${escapeHtml(plan.name)}" data-id="\${plan.id}" data-field="name" placeholder="Nome">
                            <input type="number" step="0.01" value="\${plan.price}" data-id="\${plan.id}" data-field="price" placeholder="Preço" style="flex:1">
                            <input type="number" value="\${plan.months}" data-id="\${plan.id}" data-field="months" placeholder="Meses" style="width:70px">
                        </div>
                    \`;
                });
                container.innerHTML = html;
                document.querySelectorAll('.plan-item input').forEach(input => {
                    input.addEventListener('change', function() {
                        const id = this.dataset.id;
                        const field = this.dataset.field;
                        const plan = plans.find(p => p.id === id);
                        if (plan) {
                            if (field === 'name') plan.name = this.value;
                            else if (field === 'price') plan.price = parseFloat(this.value);
                            else if (field === 'months') plan.months = parseInt(this.value);
                        }
                    });
                });
            }
            function savePlans() {
                localStorage.setItem('iptv_plans', JSON.stringify(plans));
                showToast("Planos salvos!");
            }
            function resetDefaultPlans() {
                plans = [
                    { id: "mensal", name: "Mensal", price: 29.90, months: 1 },
                    { id: "bimestral", name: "Bimestral", price: 54.90, months: 2 },
                    { id: "trimestral", name: "Trimestral", price: 79.90, months: 3 },
                    { id: "anual", name: "Anual", price: 299.90, months: 12 }
                ];
                renderPlansEditor();
                savePlans();
            }
            function exportData() {
                const clients = localStorage.getItem('iptv_clients') || '[]';
                const transactions = localStorage.getItem('iptv_transactions') || '[]';
                const data = { clients: JSON.parse(clients), transactions: JSON.parse(transactions), settings, plans };
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = \`iptv_backup_\${new Date().toISOString().split('T')[0]}.json\`;
                a.click();
                URL.revokeObjectURL(a.href);
                showToast("Exportado!");
            }
            function importData(input) {
                const file = input.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = e => {
                    try {
                        const data = JSON.parse(e.target.result);
                        if (data.clients) localStorage.setItem('iptv_clients', JSON.stringify(data.clients));
                        if (data.transactions) localStorage.setItem('iptv_transactions', JSON.stringify(data.transactions));
                        if (data.settings) { settings = data.settings; localStorage.setItem('iptv_settings', JSON.stringify(settings)); applySettings(); }
                        if (data.plans) { plans = data.plans; renderPlansEditor(); savePlans(); }
                        showToast("Importado! Recarregue o dashboard para ver as mudanças.");
                    } catch(err) { alert("Arquivo inválido"); }
                };
                reader.readAsText(file);
                input.value = '';
            }
            function resetData() {
                if (confirm("⚠️ Isso apagará TODOS os dados. Continuar?")) {
                    localStorage.clear();
                    location.reload();
                }
            }
            function showToast(msg) {
                const t = document.createElement('div'); t.className='toast'; t.innerText=msg;
                document.body.appendChild(t);
                setTimeout(() => t.remove(), 2500);
            }
            function escapeHtml(s) { if(!s) return ''; return s.replace(/[&<>]/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
            loadData();
        <\/script>
        </body>
        </html>`;
    }

            .filters{display:flex;flex-direction:column;gap:8px;margin-bottom:16px;} .search-box{background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.2);border-radius:40px;padding:10px;color:white;}

        </style></head><body><div class="container"><div class="header"><h1>👥 Gestão de Clientes</h1></div>

        <script>
            let clients=[], editId=null, plans = ${plansData};
            function load(){ const s=localStorage.getItem('iptv_clients'); if(s) clients=JSON.parse(s); else initDefault(); render(); }
            function initDefault(){ const today=new Date(); clients=[{id:1,name:"João Silva",whatsapp:"11999999999",planId:"mensal",dueDate:new Date(today.setDate(today.getDate()+15)).toISOString().split('T')[0],status:"active"},{id:2,name:"Maria Santos",whatsapp:"11988888888",planId:"anual",dueDate:new Date(today.setDate(today.getDate()+180)).toISOString().split('T')[0],status:"active"},{id:3,name:"Carlos Oliveira",whatsapp:"11977777777",planId:"trimestral",dueDate:new Date(today.setDate(today.getDate()-5)).toISOString().split('T')[0],status:"expired"}]; save(); }
            function save(){ localStorage.setItem('iptv_clients',JSON.stringify(clients)); }
            function addTransaction(desc,amt,cat,date){ let t=JSON.parse(localStorage.getItem('iptv_transactions')||'[]'); t.unshift({id:Date.now(),type:"income",description:desc,amount:amt,category:cat,date:date}); localStorage.setItem('iptv_transactions',JSON.stringify(t)); }
            function getPlanById(id){ return plans.find(p=>p.id===id) || plans[0]; }
            function renderPlansFilter(){ const select=document.getElementById('filterPlan'); let html='<option value="all">Todos planos</option>'; plans.forEach(p=>{ html+='<option value="'+p.id+'">'+p.name+'</option>'; }); select.innerHTML=html; }
            function renderPlanOptions(){ const select=document.getElementById('planSelect'); let html=''; plans.forEach(p=>{ html+='<option value="'+p.id+'">'+p.name+' - '+formatCurrency(p.price)+'</option>'; }); select.innerHTML=html; }
            function render(){ const search=document.getElementById('searchClient').value.toLowerCase(); const pFilter=document.getElementById('filterPlan').value; let filt=clients.filter(c=>(c.name.toLowerCase().includes(search)||c.whatsapp.includes(search))&&(pFilter==='all'||c.planId===pFilter)); const div=document.getElementById('clientsList'); if(filt.length===0){ div.innerHTML='<div style="text-align:center;padding:1rem;">Nenhum cliente</div>'; return; } let html=''; filt.forEach(c=>{ const plan=getPlanById(c.planId); let statusClass='status-active',statusText='Ativo'; const days=Math.ceil((new Date(c.dueDate)-new Date())/(1000*3600*24)); if(c.status==='expired'||days<0){ statusClass='status-expired'; statusText='Expirado'; }else if(days<=7){ statusClass='status-warning'; statusText='Vence em '+days+' dias'; } html+='<div class="client-card"><div class="client-header"><span class="client-name">'+escapeHtml(c.name)+'</span><span class="client-plan">'+plan.name+'</span></div><div>📞 '+c.whatsapp+'</div><div>📅 '+new Date(c.dueDate).toLocaleDateString()+'</div><div><span class="'+statusClass+' client-status">'+statusText+'</span></div><div class="client-actions"><button class="btn btn-sm" onclick="edit('+c.id+')">✏️</button><button class="btn btn-sm btn-danger" onclick="del('+c.id+')">🗑️</button><button class="btn btn-sm btn-success" onclick="renew('+c.id+')">🔄</button></div></div>'; }); div.innerHTML=html; }

            function closeModal(){ document.getElementById('modal').classList.add('hidden'); }
            function saveClient(){ const name=document.getElementById('name').value; const whats=document.getElementById('whatsapp').value; const planId=document.getElementById('planSelect').value; const due=document.getElementById('dueDate').value; const stat=document.getElementById('status').value; if(!name||!whats||!due) return alert('Preencha todos'); const plan=getPlanById(planId); if(editId){ const idx=clients.findIndex(c=>c.id===editId); if(idx!==-1) clients[idx]={...clients[idx],name,whatsapp:whats,planId,dueDate:due,status:stat}; }else{ const newId=Date.now(); clients.push({id:newId,name,whatsapp:whats,planId,dueDate:due,status:stat,notes:''}); addTransaction('Assinatura '+plan.name+' - '+name, plan.price, 'Assinatura', due); } save(); closeModal(); render(); }
            function del(id){ if(confirm('Excluir cliente?')){ clients=clients.filter(c=>c.id!==id); save(); render(); } }
            function renew(id){ const c=clients.find(c=>c.id===id); if(c){ const plan=getPlanById(c.planId); const newDue=new Date(c.dueDate); newDue.setMonth(newDue.getMonth()+plan.months); c.dueDate=newDue.toISOString().split('T')[0]; c.status='active'; save(); addTransaction('Renovação '+plan.name+' - '+c.name, plan.price, 'Assinatura', new Date().toISOString().split('T')[0]); render(); alert('Renovado!'); } }

            function escapeHtml(s){ if(!s) return ''; return s.replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }

        <\/script></body></html>`;
    }

    function generateFinancePageHTML() {
